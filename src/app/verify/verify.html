<div class="verify-container">
  <div class="verify-box">
    <div class="email-icon">
      <i class="fa-solid fa-envelope-open-text"></i>
    </div>

    <h2>Email bestätigen</h2>
    <p class="subtitle">
      Wir haben einen 6-stelligen Code an<br />
      <strong>{{ email }}</strong> gesendet.
    </p>

    <div class="code-input-group">
      <input
        type="text"
        [(ngModel)]="code"
        maxlength="6"
        placeholder="000000"
        class="code-input"
        (keyup.enter)="onVerify()"
        autocomplete="one-time-code"
      />
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>
    <p class="success" *ngIf="success">{{ success }}</p>

    <button class="btn-verify" (click)="onVerify()">
      <i class="fa-solid fa-check-circle"></i>
      Bestätigen
    </button>

    <div class="resend-row">
      <span class="resend-label">Kein Code erhalten?</span>
      <button class="btn-resend" (click)="onResend()" [disabled]="resendCooldown > 0">
        {{ resendCooldown > 0 ? 'Erneut senden (' + resendCooldown + 's)' : 'Erneut senden' }}
      </button>
    </div>

    <div class="login-link">
      <a routerLink="/">Zurück zum Login</a>
    </div>
  </div>
</div>
