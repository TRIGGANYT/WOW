<div class="ai-mentor" [class.sidebar-open]="sidebarOpen">
  <app-nav></app-nav>

  <div class="chat-layout">
    <!-- Sidebar Toggle Button + Label -->
    <button class="sidebar-toggle" (click)="toggleSidebar()" [class.active]="sidebarOpen">
      <i class="fa-solid fa-clock-rotate-left"></i>
    </button>
    <span class="sidebar-label" [class.visible]="sidebarOpen">CHATS</span>

    <!-- Chat History Sidebar -->
    <aside class="chat-sidebar" [class.open]="sidebarOpen">
      <div class="sidebar-header">
        <button class="new-chat-btn" (click)="newChat()">
          <i class="fa-solid fa-plus"></i> Neuer Chat
        </button>
      </div>

      <div class="sidebar-list">
        @if (conversations.length === 0) {
          <div class="no-history">
            <i class="fa-solid fa-comments"></i>
            <p>Noch keine Chats</p>
          </div>
        }

        @for (conv of conversations; track conv._id) {
          <div
            class="history-item"
            [class.active]="isActive(conv._id)"
            (click)="loadConversation(conv)"
          >
            <div class="history-item-content">
              <span class="history-title">{{ conv.title }}</span>
              <span class="history-date">{{ formatDate(conv.updatedAt) }}</span>
            </div>
            <button
              class="delete-btn"
              (click)="deleteConversation($event, conv._id)"
              title="Löschen"
            >
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </div>
        }
      </div>
    </aside>

    <!-- Main Chat Area -->
    <div class="chat-main">
      <app-chat></app-chat>
    </div>
  </div>
</div>
