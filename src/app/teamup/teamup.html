<div class="teamup-container">
  <header class="teamup-header"></header>

  <div class="teams-grid">
    @for (team of teams; track team._id) {
      <app-team-card 
        [team]="team" 
        [isMember]="isMember(team)"
        (join)="joinTeam($event)"
        (leave)="leaveTeam($event)"
      />
    } @empty {
      <div class="empty-state">
        <p>No teams yet. Be the first to create one!</p>
      </div>
    }
  </div>

  <button class="btn-create-team" (click)="openCreateModal()">
    <i class="fa-solid fa-plus"></i>
    Create New Team
  </button>
</div>

@if (showCreateModal) {
  <app-create-team-modal 
    (close)="closeCreateModal()" 
    (create)="createTeam($event)" 
  />
}
